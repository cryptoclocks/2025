<head>

    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin: 20px 0;
            text-align: center;
        }

        h2,
        h3 {
            color: #007bff;
            text-align: center;
            margin-bottom: 24px;
        }

        input[type="text"],
        input[type="password"],
        input[type="file"],
        .button,
        select,
        input[type="color"],
        input[type="number"] {
            width: calc(100% - 24px);
            padding: 10px;
            margin-bottom: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #0056b3;
        }

        .color-picker-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            margin-left: 14px;
            margin-right: 12px;
        }

        .color-picker-container label {
            flex: 1;
            text-align: left;
        }

        .color-picker-container input[type="color"],
        #colorPicker1,
        #colorPicker2 {
            flex: none;
            margin-left: 10px;
            height: 38px;
            width: 64px;
            padding: 1px;
            border-radius: 5px;
            border: 1px solid #ccc;
            background-color: #fff;
            font-size: 16px;
        }

        .coin-label {
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        .select-container {
            display: flex;
            align-items: center;
            margin-top: 10px;
            margin-bottom: 30px;
        }

        .coin-preview {
            margin-top: -15px;
            height: 38px;
            width: 38px;
            margin-right: 10px;
            object-fit: contain;
        }

        .asset-type {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .asset-type label {
            flex: 1 0 48%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin: 5px;
            cursor: pointer;
            padding: 10px;
            font-size: 16px;
            background-color: #f0f7ff;
            border-radius: 5px;
            border: 1px solid #ccc;
            transition: background-color 0.3s;
            height: 48px;
            min-width: 30%;
            max-width: 50px;
        }

        .asset-type input[type="radio"] {
            display: none;
        }

        .asset-type input[type="radio"]:checked+label {
            background-color: #007bff;
            color: white;
            border-radius: 5px;
            padding: 10px;
            height: 48px;
        }

        .sales-channel {
            text-align: center;
            margin-top: 20px;
        }

        .channel-link {
            display: inline-block;
            margin: 10px;
            text-decoration: none;
            color: #007bff;
            border: solid 1px #007bff;
            padding: 10px;
            border-radius: 5px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .qrcode-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            position: relative;
            margin-top: 20px;
        }

        .qrcode-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 64px;
            height: auto;
        }

        .qrcode {
            margin: 10px;
            padding: 10px;
            background-color: #fff;
            border: 1px solid #007bff;
            border-radius: 8px;
        }

        .card {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin: 1px 0;
            width: 100%;
            box-sizing: border-box;
            margin-top: 30px;
            margin-bottom: 50px;
        }

        #preview {
            display: block;
            margin: 0 auto;
            max-width: 100px;
        }

        /* ซ่อน dynamicPages โดยค่าเริ่มต้น */
        #dynamicPages {
            display: none;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
        }

        input:checked+.slider {
            background-color: #007bff;
        }

        input:checked+.slider:before {
            transform: translateX(26px);
        }

        .slider.round {
            border-radius: 34px;
        }

        .slider.round:before {
            border-radius: 50%;
        }

        .color-picker-container.flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .duration-label,
        .duration-select,
        .toggle-checkbox {
            height: 34px;
            line-height: 34px;
        }

        .duration-select {
            padding: 0 10px;
            width: auto;
            margin-left: 10px;
            margin-right: 10px;
            margin-top: 16px;
        }

        .toggle-checkbox {
            transform: scale(1.5);
        }

            flex-wrap: wrap;
            justify-content: center;

        .gallery img {
            max-width: 320px;
            max-height: 240px;
            border-radius: 10px;
            border: 2px solid #ccc;
            /* เพิ่มขอบ */
        }

        .gallery div span {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 16px;
            /* เพิ่มขนาดตัวอักษร */
        }

        .delete-btn {
            position: absolute;

            right: 10px;
            background-color: red;
            color: white;
            border: none;

        .add-btn {

            background-color: #0056b3;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }



        .add-btn:hover {
            background-color: #024185;
        }



        /* input[type="file"] {
            display: none;
        } */

    <script>
        function convertAndPreviewImage(event) {
            var file = event.target.files[0];
            var reader = new FileReader();

            reader.onload = function (e) {
                var img = new Image();
                img.onload = function () {
                    var canvas = document.createElement('canvas');
                    var ctx = canvas.getContext('2d');
                    canvas.width = 100;
                    canvas.height = 100;

                    // คำนวณสัดส่วนของภาพเพื่อให้ภาพไม่เสียอัตราส่วน
                    var ratio = Math.min(canvas.width / img.width, canvas.height / img.height);
                    var newWidth = img.width * ratio;
                    var newHeight = img.height * ratio;

                    // เติมพื้นหลังสีดำ
                    ctx.fillStyle = 'black';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // วาดภาพตรงกลาง
                    var xOffset = (canvas.width - newWidth) / 2;
                    var yOffset = (canvas.height - newHeight) / 2;
                    ctx.drawImage(img, xOffset, yOffset, newWidth, newHeight);

                    canvas.toBlob(function (blob) {
                        var newFile = new File([blob], file.name.replace(/\..+$/, '.jpg'), { type: 'image/jpeg' });
                        var dataTransfer = new DataTransfer();
                        dataTransfer.items.add(newFile);
                        document.getElementById('imageInput').files = dataTransfer.files;

                        var output = document.getElementById('preview');
                        output.src = URL.createObjectURL(blob);
                    }, 'image/jpeg', 0.92);
                };
                img.src = e.target.result;
            };

            reader.readAsDataURL(file);
        }
    </script>
    <script>
        // Function to open index2.html in a new tab
        function openIndex2() {
            window.open('/index2.html', '_blank');
        }
        // Fetch initial values from ESP32
        window.addEventListener('load', function () {
            fetchInitialValues();

        });

        function fetchInitialValues() {
            fetch('/initial-values')
                .then(response => response.json())
                .then(data => {
                    console.log('Initial values:', data); // Debug output
                    document.getElementById('pageMode').checked = data.pageMode === 'dynamic';
                    document.getElementById('profileDuration').value = data.profileDuration || 15;
                    document.getElementById('profileToggle').checked = data.profileToggle;
                    document.getElementById('coinDuration').value = data.coinDuration || 15;
                    document.getElementById('coinToggle').checked = data.coinToggle;
                    document.getElementById('screensaverDuration').value = data.screensaverDuration || 15;
                    document.getElementById('screensaverToggle').checked = data.screensaverToggle;
                    document.getElementById('screensaverToggle').readOnly = !data.sdStatus;  // Disable screensaverToggle if sdStatus is false
                    document.getElementById('screensaverButton').disabled = !data.sdStatus;  // Disable screensaverToggle if sdStatus is false

                    if (!data.sdStatus) {
                        screensaverCard.style.filter = 'grayscale(100%)';
                        // screensaverCard.querySelectorAll('input, button, select').forEach(element => {
                        //     element.disabled = true;
                        // });

                    }


                    document.getElementById('lotteryAlertToggle').checked = data.lotteryAlert === 'on';
                    document.getElementById('timeZoneSelect').value = data.timeZone || 'Asia/Bangkok';

                    const dynamicPages = document.getElementById('dynamicPages');
                    if (data.pageMode === 'dynamic') {
                        dynamicPages.style.display = 'block';
                    } else {
                        dynamicPages.style.display = 'none';
                    }

                    let type1 = data.type1;
                    let type2 = data.type2;
                    let assetType1 = convertTypeToAsset(type1);
                    let assetType2 = convertTypeToAsset(type2);
                    setRadioSelection('assetType1', assetType1);
                    setRadioSelection('assetType2', assetType2);
                    setupEventListeners();
                    fetchData(assetType1, 'coinSelect1', 'coinPreview1', data.coin1);
                    fetchData(assetType2, 'coinSelect2', 'coinPreview2', data.coin2);

                    document.getElementById('type1').value = type1;
                    document.getElementById('type2').value = type2;

                    document.getElementById('colorPicker1').value = data.color1;
                    document.getElementById('colorPicker2').value = data.color2;

                    updateToggleValues();
                })
                .catch(error => console.error('Error fetching initial values:', error));

        }

        // Page Mode Toggle
        // Page Mode Toggle
        const pageMode = document.getElementById('pageMode');
        const dynamicPages = document.getElementById('dynamicPages');

        pageMode.addEventListener('change', function () {
            dynamicPages.style.display = this.checked ? 'block' : 'none';
        });

        // Update hidden input values based on toggle switches
        const profileToggle = document.getElementById('profileToggle');
        const coinToggle = document.getElementById('coinToggle');
        const screensaverToggle = document.getElementById('screensaverToggle');
        const lotteryAlertToggle = document.getElementById('lotteryAlertToggle');

        function updateToggleValues() {
            document.getElementById('pageModeValue1').value = pageMode.checked ? 'dynamic' : 'static';
            document.getElementById('profileToggleValue1').value = profileToggle.checked ? 'true' : 'false';
            document.getElementById('coinToggleValue1').value = coinToggle.checked ? 'true' : 'false';
            document.getElementById('screensaverToggleValue1').value = screensaverToggle.checked ? 'true' : 'false';
            // อัปเดตค่า lotteryAlert
            document.getElementById('lotteryAlert').value = lotteryAlertToggle.checked ? 'on' : 'off';
        }
        pageMode.addEventListener('change', updateToggleValues);
        profileToggle.addEventListener('change', updateToggleValues);
        coinToggle.addEventListener('change', updateToggleValues);
        screensaverToggle.addEventListener('change', updateToggleValues);
        lotteryAlertToggle.addEventListener('change', updateToggleValues);


        // Fetch and display links
        const linksUrl = 'https://raw.githubusercontent.com/bigboxthailand/cryptoclock/main/download_links.json';
        fetch(linksUrl)
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('dynamicLinks');
                data.links.forEach(link => {
                    const button = document.createElement('a');
                    button.href = link.url;
                    button.className = 'channel-link';
                    button.innerText = link.name;
                    button.target = "_blank";
                    container.appendChild(button);
                    const qrContainer = document.createElement('div');
                    qrContainer.className = 'qrcode-container';
                    const qrCode = document.createElement('div');
                    qrCode.className = 'qrcode';
                    qrContainer.appendChild(qrCode);
                    container.appendChild(qrContainer);
                    new QRCode(qrCode, {
                        text: link.url,
                        width: 128,
                        height: 128
                    });
                    if (link.logo) {
                        const logoImg = document.createElement('img');
                        logoImg.src = link.logo;
                        logoImg.className = 'qrcode-logo';
                        qrContainer.appendChild(logoImg);
                    }
                });
            })
            .catch(error => console.error('Error loading links:', error));



        // Fetch profile data
        window.addEventListener('load', function () {
            fetchProfileImage();
            fetchProfileInfo();
        });

        function fetchProfileImage() {
            var imageElement = document.getElementById('preview');
            imageElement.src = '/profile.jpg';
            imageElement.style.display = 'block';
        }

        function fetchProfileInfo() {
            fetch('/profile-info')
                .then(response => response.json())
                .then(data => {
                    document.getElementsByName('firstname')[0].value = data.Firstname.trim() || '';
                    document.getElementsByName('lastname')[0].value = data.Lastname.trim() || '';
                    document.getElementsByName('nickname')[0].value = data.Nickname.trim() || '';
                    document.getElementsByName('position')[0].value = data.Position.trim() || '';
                    document.getElementsByName('company')[0].value = data.Company.trim() || '';
                    document.getElementsByName('motto')[0].value = data.Motto.trim() || '';
                    if (data.BGColor) document.getElementById('bgcolor').value = data.BGColor.trim() || '0x000000';
                    if (data.NameColor) document.getElementById('namecolor').value = data.NameColor.trim() || '0xFFAE00';
                    if (data.DetailColor) document.getElementById('detailcolor').value = data.DetailColor.trim() || '0xFFFFFF';
                    if (data.MottoColor) document.getElementById('mottocolor').value = data.MottoColor.trim() || '0xFFAE00';
                    if (data.DateTimeColor) document.getElementById('datetimecolor').value = data.DateTimeColor.trim() || '0xFFFFFF';
                });
        }

        // Coin selection scripts
        let coinTypes = {
            crypto: {},
            thaiStock: {},
            interStock: {},
            currency: {}
        };



        function setRadioSelection(name, assetType) {
            document.querySelector(`[name="${name}"][value="${assetType}"]`).checked = true;
        }

        function convertTypeToAsset(type) {
            switch (type) {
                case "0":
                    return 'crypto';
                case "1":
                    return 'crypto';
                case "2":
                    return 'crypto';
                case "3":
                    return 'crypto';
                case "4":
                    return 'thaiStock';
                case "5":
                    return 'interStock';
                case "6":
                    return 'currency';
                default:
                    return 'crypto';
            }
        }

        function setupEventListeners() {
            document.querySelectorAll('[name="assetType1"]').forEach(radio => {
                radio.addEventListener('change', () => {
                    let assetType = document.querySelector('[name="assetType1"]:checked').value;
                    fetchData(assetType, 'coinSelect1', 'coinPreview1');
                });
            });

            document.querySelectorAll('[name="assetType2"]').forEach(radio => {
                radio.addEventListener('change', () => {
                    let assetType = document.querySelector('[name="assetType2"]:checked').value;
                    fetchData(assetType, 'coinSelect2', 'coinPreview2');
                });
            });

            document.getElementById("coinSelect1").addEventListener("change", function () {
                let assetType = document.querySelector('[name="assetType1"]:checked').value;
                updateCoinPreview(this.value, 'coinPreview1', assetType);
                updateTypeInput(this.value, assetType, 'type1');
            });

            document.getElementById("coinSelect2").addEventListener("change", function () {
                let assetType = document.querySelector('[name="assetType2"]:checked').value;
                updateCoinPreview(this.value, 'coinPreview2', assetType);
                updateTypeInput(this.value, assetType, 'type2');
            });

            const toggleButton = document.getElementById('lotteryAlertToggle');
            const lotteryAlertInput = document.getElementById('lotteryAlert');
            toggleButton.addEventListener('click', () => {
                toggleButton.classList.toggle('active');
                lotteryAlertInput.value = toggleButton.classList.contains('active') ? 'on' : 'off';
            });

            // Page Mode Toggle
            const pageModeToggle = document.getElementById('pageMode');
            const dynamicPages = document.getElementById('dynamicPages');
            pageModeToggle.addEventListener('change', function () {
                dynamicPages.style.display = this.checked ? 'block' : 'none';
            });
        }

        function fetchData(assetType, selectId, previewId, defaultValue) {
            let csvFile = assetType === 'crypto' ? 'CryptoCoin3.csv' :
                assetType === 'thaiStock' ? 'StockTH.csv' :
                    assetType === 'interStock' ? 'StockEN.csv' : 'Currency.csv';
            let baseUrl = "https://raw.githubusercontent.com/bigboxthailand/cryptoclock/main/";
            fetch(`${baseUrl}${csvFile}`)
                .then(response => response.text())
                .then(data => {
                    updateDropdown(data, selectId, previewId, assetType, defaultValue);
                })
                .catch(error => console.error('Error fetching data:', error));
        }

        function updateDropdown(data, selectId, previewId, assetType, defaultValue) {
            let lines = data.split("\n");
            coinTypes[assetType] = {};
            let coins = lines.map(line => {
                let parts = line.split(",");
                let coin = parts[0].trim();
                let type = parts[1].trim();
                coinTypes[assetType][coin] = type;
                return { name: coin, type: type };
            }).filter(coin => coin.name);

            coins.sort((a, b) => a.name.localeCompare(b.name));
            let dropdown = document.getElementById(selectId);
            dropdown.innerHTML = '';
            coins.forEach(coin => {
                let option = new Option(coin.name, coin.name);
                option.selected = coin.name === defaultValue;
                dropdown.appendChild(option);
            });
            dropdown.value = defaultValue && coins.some(coin => coin.name === defaultValue) ? defaultValue : coins[0].name;
            updateCoinPreview(dropdown.value, previewId, assetType);
            updateTypeInput(dropdown.value, assetType, selectId.replace('coinSelect', 'type'));
        }

        function updateCoinPreview(coin, previewId, assetType) {
            let baseUrl = "https://raw.githubusercontent.com/bigboxthailand/cryptoclock/main/";
            let imagePath = assetType === 'crypto' ? `${baseUrl}${coin.toLowerCase()}.jpg` :
                assetType === 'thaiStock' ? `${baseUrl}stockth48/${coin.toLowerCase()}.jpg` :
                    assetType === 'interStock' ? `${baseUrl}stocken48/${coin.toLowerCase()}.jpg` :
                        `${baseUrl}currency48/${coin.toLowerCase()}.jpg`;
            document.getElementById(previewId).src = imagePath;
        }

        function updateTypeInput(coin, assetType, typeId) {
            let typeValue = coinTypes[assetType][coin];
            document.getElementById(typeId).value = typeValue;
        }

        document.getElementById("combined-form").addEventListener("submit", function (e) {

            const selectedCoin1 = document.getElementById("coinSelect1").value;
            const selectedCoin2 = document.getElementById("coinSelect2").value;
            const type1 = coinTypes[assetType][selectedCoin1];
            const type2 = coinTypes[assetType][selectedCoin2];
            document.getElementById("type1").value = type1;
            document.getElementById("type2").value = type2;



        });
    </script>
</body>

</html>
